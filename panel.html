<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Bot Panel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f13; color: #e0e0f0; font-family: monospace; padding: 16px; }
h1 { color: #7c6aff; margin-bottom: 16px; font-size: 20px; }
.card { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
input { background: #0f0f13; border: 1px solid #2a2a3a; color: #e0e0f0; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 8px; font-family: monospace; font-size: 13px; }
button { background: #7c6aff; border: none; color: white; padding: 10px; border-radius: 8px; width: 100%; font-size: 14px; cursor: pointer; font-family: monospace; margin-bottom: 6px; }
button:hover { background: #6a58e0; }
.bot-item { background: #0f0f13; border: 1px solid #2a2a3a; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.bot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.online { color: #57f287; font-size: 12px; }
.offline { color: #ed4245; font-size: 12px; }
.stop-btn { background: #ed4245; padding: 6px 12px; width: auto; font-size: 12px; margin: 0; }
.stop-btn:hover { background: #c0392b; }
.chat-box { background: #0a0a0f; border: 1px solid #2a2a3a; border-radius: 8px; height: 180px; overflow-y: auto; padding: 8px; margin-bottom: 8px; font-size: 12px; line-height: 1.6; }
.chat-msg { margin-bottom: 2px; }
.chat-msg .user { color: #7c6aff; }
.chat-msg .system { color: #57f287; }
.chat-msg .warn { color: #ed4245; }
.send-row { display: flex; gap: 6px; }
.send-row input { margin: 0; flex: 1; }
.send-btn { width: auto; padding: 10px 14px; margin: 0; }
h2 { color: #aaa; font-size: 13px; margin-bottom: 10px; }
</style>
</head>
<body>
<h1>⚡ MC Bot Panel</h1>

<div class="card">
  <h2>Yeni Bot Ekle</h2>
  <input id="host" placeholder="Sunucu IP" />
  <input id="port" placeholder="Port (varsayılan: 25565)" />
  <input id="username" placeholder="Bot kullanıcı adı" />
  <button onclick="startBot()">▶ Botu Başlat</button>
</div>

<div class="card">
  <h2>Çalışan Botlar</h2>
  <div id="bot-list">Yükleniyor...</div>
</div>

<script>
const chatLogs = {};

async function startBot() {
  const host = document.getElementById('host').value.trim();
  const port = document.getElementById('port').value.trim() || '25565';
  const username = document.getElementById('username').value.trim();
  if (!host || !username) { alert('IP ve kullanıcı adı zorunlu!'); return; }
  const res = await fetch('/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ host, port, username })
  });
  const data = await res.json();
  chatLogs[data.id] = [];
  document.getElementById('host').value = '';
  document.getElementById('username').value = '';
  loadBots();
}

async function stopBot(id) {
  await fetch('/stop', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  delete chatLogs[id];
  loadBots();
}

async function sendMsg(id) {
  const input = document.getElementById('msg-' + id);
  const text = input.value.trim();
  if (!text) return;
  await fetch('/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, text })
  });
  input.value = '';
}

async function loadBots() {
  const res = await fetch('/bots');
  const bots = await res.json();
  const list = document.getElementById('bot-list');
  if (!bots.length) { list.innerHTML = '<p style="color:#555">Henüz bot yok.</p>'; return; }

  bots.forEach(b => {
    if (!chatLogs[b.id]) chatLogs[b.id] = [];
    b.chat.forEach(msg => {
      if (!chatLogs[b.id].find(m => m.t === msg.t)) chatLogs[b.id].push(msg);
    });
  });

  list.innerHTML = bots.map(b => `
    <div class="bot-item">
      <div class="bot-header">
        <div>
          <b>${b.username}</b> → ${b.host}<br>
          <span class="${b.online ? 'online' : 'offline'}">${b.online ? '● Çevrimiçi' : '● Çevrimdışı'}</span>
        </div>
        <button class="stop-btn" onclick="stopBot('${b.id}')">Durdur</button>
      </div>
      <div class="chat-box" id="chat-${b.id}">
        ${(chatLogs[b.id] || []).map(m => `
          <div class="chat-msg">
            <span class="${m.type}">[${m.type === 'system' ? 'SYS' : m.user}]</span> ${m.text}
          </div>`).join('')}
      </div>
      <div class="send-row">
        <input id="msg-${b.id}" placeholder="Mesaj veya /komut yaz..." onkeydown="if(event.key==='Enter') sendMsg('${b.id}')" />
        <button class="send-btn" onclick="sendMsg('${b.id}')">Gönder</button>
      </div>
    </div>
  `).join('');

  bots.forEach(b => {
    const box = document.getElementById('chat-' + b.id);
    if (box) box.scrollTop = box.scrollHeight;
  });
}

loadBots();
setInterval(loadBots, 2000);
</script>
</body>
</html>
